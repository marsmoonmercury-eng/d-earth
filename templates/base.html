<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}塾管理システム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: #1a3a5c !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #aed6f1 !important; }
    .card { border: none; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
    .badge-type { font-size: .8rem; }
    .table th { background-color: #e8f0fe; }
    textarea { font-size: .95rem; }
    .parent-contact-box {
      background: #f0f8e8;
      border-left: 4px solid #28a745;
      padding: 1rem;
      white-space: pre-wrap;
      font-family: 'Meiryo', sans-serif;
      font-size: .9rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">塾管理システム</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">ダッシュボード</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('students') }}">生徒一覧</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('add_student') }}">生徒登録</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('reports') }}">レポート</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
